project:
  name: bike_sharing_ml
  random_seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  day_file: day.csv
  hour_file: hour.csv

granularity: hour

split:
  train_val_fraction: 0.75
  n_cv_splits: 5

target:
  column: cnt
  log_transform: true

features:
  cyclical:
    mnth: 12
    weekday: 7
    hr: 24
  enable_lag_features: false
  lag_periods: [1, 24]
  rolling_windows: [3, 24]

optuna:
  n_trials: 25
  timeout_seconds: null
  models: [lightgbm, xgboost, catboost]

random_forest:
  n_iter: 20

serving:
  default_granularity: hour
  model_dir: models
  api_host: 0.0.0.0
  api_port: 8000
  api_base_url: http://localhost:8000
